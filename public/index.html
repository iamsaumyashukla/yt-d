<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stratovate | YT Downloader</title>
<style>
  :root {
    --bg-color: #f8fafc; --surface: #ffffff; --border: #e2e8f0; --border-hover: #cbd5e1;
    --accent: #2563eb; --accent-hover: #1d4ed8; --accent-glow: rgba(37, 99, 235, 0.15);
    --text-main: #0f172a; --text-muted: #64748b; --text-light: #94a3b8;
    --danger: #ef4444; --success: #10b981; 
    --radius: 12px; --font: 'Roboto', system-ui, -apple-system, sans-serif;
    --shadow-sm: 0 2px 4px rgba(0,0,0,0.02), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.04), 0 4px 6px -2px rgba(0,0,0,0.02);
    --shadow-accent: 0 8px 20px -4px rgba(37, 99, 235, 0.25);
    --header-bg: rgba(255, 255, 255, 0.7); --card-bg: rgba(255, 255, 255, 0.6);
  }

  body {
    font-family: var(--font); background-color: var(--bg-color);
    background-image: radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.15) 0px, transparent 50%), radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%), radial-gradient(var(--text-light) 1px, transparent 1px);
    background-size: 100% 100%, 100% 100%, 24px 24px; background-attachment: fixed;
    color: var(--text-main); margin: 0; display: flex; flex-direction: column; min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app-header { 
      background: var(--header-bg); backdrop-filter: blur(16px); 
      border-bottom: 1px solid var(--border); padding: 0 32px; 
      display: flex; align-items: center; height: 70px; position: sticky; top: 0; z-index: 100; 
  }
  
  .logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 1.35rem; letter-spacing: -0.03em; }
  .logo-icon { color: #f59e0b; filter: drop-shadow(0 2px 4px rgba(245, 158, 11, 0.3)); }

  .main-content { max-width: 600px; margin: 80px auto; padding: 0 20px; width: 100%; box-sizing: border-box;}

  .card { 
      background: var(--card-bg); backdrop-filter: blur(20px); 
      border: 1px solid var(--border); border-radius: var(--radius); 
      padding: 40px; box-shadow: var(--shadow-sm); transition: all 0.4s ease; 
      text-align: center;
  }
  .card:hover { box-shadow: var(--shadow-md); border-color: var(--border-hover); background: var(--surface); }

  h2 { font-size: 1.8rem; font-weight: 700; margin-top: 0; margin-bottom: 12px; letter-spacing: -0.02em; }
  p.subtitle { color: var(--text-muted); font-size: 1rem; margin-bottom: 32px; line-height: 1.5; }

  .form-group { text-align: left; margin-bottom: 24px; }
  label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  
  input[type="text"] { 
      font-family: var(--font); font-size: 1rem; padding: 14px 16px; 
      border: 1px solid var(--border); border-radius: 8px; background: var(--surface); 
      color: var(--text-main); outline: none; transition: all 0.25s ease; width: 100%; box-sizing: border-box;
  }
  input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); transform: translateY(-1px); }

  .btn-primary { 
      font-family: var(--font); font-size: 1rem; font-weight: 600; 
      padding: 14px 24px; border-radius: 8px; border: none; cursor: pointer; 
      background: var(--accent); color: #fff; box-shadow: var(--shadow-accent); 
      width: 100%; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .btn-primary:hover { background: var(--accent-hover); box-shadow: 0 10px 25px -4px rgba(37, 99, 235, 0.4); transform: translateY(-2px); }
  .btn-primary:active { transform: translateY(0) scale(0.98); }

  .status-area { margin-top: 20px; font-size: 0.9rem; font-weight: 500; display: none; padding: 12px; border-radius: 8px; }
  .status-processing { background: var(--accent-glow); color: var(--accent); border: 1px solid rgba(37, 99, 235, 0.2); display: block; }
  .status-error { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); display: block;}
</style>
</head>
<body>

<header class="app-header">
  <div class="logo">
    <span class="logo-icon">⚡</span> STRATOVATE 
    <span style="font-size:0.85rem;color:var(--text-muted);font-weight:500;margin-left:8px;">YT Downloader</span>
  </div>
</header>

<div class="main-content">
  <div class="card">
    <h2>Video Extractor</h2>
    <p class="subtitle">Paste your YouTube link below. The server will bypass CORS and stream the MP4 directly to your device.</p>
    
    <div class="form-group">
      <label>YouTube URL</label>
      <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=...">
    </div>
    
    <button class="btn-primary" onclick="downloadVideo()">⚡ Generate Download</button>
    
    <div id="statusBox" class="status-area"></div>
  </div>
</div>

<script>
  function downloadVideo() {
      const urlInput = document.getElementById('videoUrl').value.trim();
      const statusBox = document.getElementById('statusBox');
      
      if (!urlInput) {
          statusBox.className = 'status-area status-error';
          statusBox.innerText = 'Please enter a valid YouTube URL.';
          return;
      }

      statusBox.className = 'status-area status-processing';
      statusBox.innerHTML = 'Connecting to server and parsing video data...';
      
      window.location.href = `/download?url=${encodeURIComponent(urlInput)}`;
      
      setTimeout(() => {
          statusBox.innerHTML = 'Download initiated! Check your browser downloads. <br><span style="font-size:0.8rem; opacity:0.8;">If nothing happens, YouTube may be temporarily blocking the server IP.</span>';
      }, 4000);
  }
</script>
</body>
</html>
