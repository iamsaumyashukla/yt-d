<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 100px; background-color: #f9f9f9; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 500px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
        button { padding: 12px 24px; cursor: pointer; background-color: #ff0000; color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; transition: background 0.3s; width: 100%; }
        button:hover { background-color: #cc0000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>YT Downloader</h1>
        <p>Paste a YouTube link below to download the video.</p>
        <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=...">
        <button onclick="downloadVideo()">Download Video</button>
    </div>

    <script>
        function downloadVideo() {
            const urlInput = document.getElementById('videoUrl').value;
            if (!urlInput) {
                alert('Please enter a YouTube URL');
                return;
            }
            // Because the frontend and backend are hosted together, we use a relative path
            window.location.href = `/download?url=${encodeURIComponent(urlInput)}`;
        }
    </script>
</body>
</html>
